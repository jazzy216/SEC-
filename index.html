<script>
// =========================
// GLOBAL STATE (PERSISTENT)
// =========================
const STORAGE_KEY = "secplus_lab_v1";

const DEFAULT_STATE = {
  xp: 0,
  streak: 0,
  lastStudyDate: null,
  bestScore: null,
  cardsStudied: 0,
  lessonsCompleted: [],
  currentCardIndex: 0,
  currentCardFilter: "all"
};

let state = loadState();

// =========================
// STATE MANAGEMENT
// =========================
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? { ...DEFAULT_STATE, ...JSON.parse(saved) } : DEFAULT_STATE;
  } catch {
    return DEFAULT_STATE;
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateXP(amount) {
  state.xp += amount;
  updateStreak();
  saveState();
  updateUI();
}

function updateStreak() {
  const today = new Date().toDateString();

  if (state.lastStudyDate === today) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);

  if (state.lastStudyDate === yesterday.toDateString()) {
    state.streak++;
  } else {
    state.streak = 1;
  }

  state.lastStudyDate = today;
}

// =========================
// NAVIGATION
// =========================
let currentView = "dashboard";

function navigate(view) {
  if (view === currentView) return;

  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(`view-${view}`).classList.add("active");

  currentView = view;

  if (view === "flashcards") loadFlashcard();
  if (view === "quiz") startQuiz();

  updateUI();
}

// =========================
// UI UPDATE
// =========================
function updateUI() {
  document.getElementById("xp-pill").innerText = `⚡ ${state.xp} XP`;
  document.getElementById("streak-pill").innerText = `🔥 ${state.streak} day streak`;

  document.getElementById("dash-xp").innerText = state.xp;
  document.getElementById("dash-score").innerText =
    state.bestScore ? `${state.bestScore}%` : "—";
  document.getElementById("dash-cards").innerText = state.cardsStudied;
}

// =========================
// FLASHCARDS
// =========================
let currentCard = 0;

function loadFlashcard() {
  const card = FLASHCARDS[currentCard];
  if (!card) return;

  document.getElementById("fc-term").innerText = card.term;
  document.getElementById("fc-def").innerText = card.definition;

  document.getElementById("fc-counter").innerText =
    `Card ${currentCard + 1} of ${FLASHCARDS.length}`;
}

function nextCard() {
  if (currentCard < FLASHCARDS.length - 1) {
    currentCard++;
    state.cardsStudied++;
    updateXP(2);
    saveState();
    loadFlashcard();
  }
}

function prevCard() {
  if (currentCard > 0) {
    currentCard--;
    loadFlashcard();
  }
}

// =========================
// QUIZ ENGINE
// =========================
let quizIndex = 0;
let score = 0;
let quizLocked = false;

function startQuiz() {
  quizIndex = 0;
  score = 0;
  loadQuestion();
}

function loadQuestion() {
  const q = QUIZ[quizIndex];
  quizLocked = false;

  document.getElementById("quiz-question").innerText = q.question;
  document.getElementById("quiz-counter").innerText =
    `${quizIndex + 1} / ${QUIZ.length}`;

  const container = document.getElementById("quiz-options");
  container.innerHTML = "";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "quiz-opt";
    btn.innerHTML = `<div class="opt-letter">${String.fromCharCode(65+i)}</div>${opt}`;

    btn.onclick = () => handleAnswer(btn, i === q.answer, q.explanation);

    container.appendChild(btn);
  });
}

function handleAnswer(btn, correct, explanation) {
  if (quizLocked) return;
  quizLocked = true;

  if (correct) {
    btn.classList.add("correct");
    score++;
    updateXP(10);
  } else {
    btn.classList.add("wrong");
  }

  document.getElementById("quiz-explanation").innerHTML = `
    <div class="explanation-box">
      <div class="exp-label">Explanation</div>
      <div class="exp-text">${explanation}</div>
    </div>
  `;

  document.getElementById("quiz-footer").innerHTML = `
    <button class="btn btn-primary" onclick="nextQuestion()">Next</button>
  `;
}

function nextQuestion() {
  quizIndex++;
  document.getElementById("quiz-explanation").innerHTML = "";
  document.getElementById("quiz-footer").innerHTML = "";

  if (quizIndex >= QUIZ.length) return finishQuiz();

  loadQuestion();
}

function finishQuiz() {
  const percent = Math.round((score / QUIZ.length) * 100);

  if (!state.bestScore || percent > state.bestScore) {
    state.bestScore = percent;
  }

  saveState();

  document.getElementById("results-score").innerText = percent + "%";
  document.getElementById("res-correct").innerText = score;
  document.getElementById("res-wrong").innerText = QUIZ.length - score;
  document.getElementById("res-xp").innerText = score * 10;

  navigate("results");
}

// =========================
// INIT
// =========================
updateUI();
</script>
